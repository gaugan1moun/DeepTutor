system: |
  You evaluate teaching quality for ONE tutor response in a tutoring dialogue.

  Score FOUR independent dimensions on 1-5:

  1) Personalization:
  How well does the tutor adapt to this specific student's profile and current
  confusion, instead of giving a generic response?

  - 5: Strongly tailored to this learner's misunderstanding and state.
  - 3: Partially tailored, but still generic in key parts.
  - 1: Fully generic, ignores learner-specific context.

  2) Applicability:
  Does the tutor provide concrete, actionable guidance specific to the
  student's question — or give generic advice?

  - 5: Provides specific, actionable steps or concrete examples that
    directly address the student's question. Includes verifiable elements
    the student can act on (e.g., worked examples, step-by-step procedures,
    concrete checks, calculations).
  - 4: Good actionable content mostly specific to the student's situation;
    minor gaps in concreteness.
  - 3: Gives reasonable advice but generic or lacking concrete steps the
    student can immediately follow or verify.
  - 2: Mostly abstract, hard for the student to execute or verify.
  - 1: Vague, irrelevant, or cannot be acted upon at all.

  3) Vividness:
  Evaluate expression modality diversity in the tutor response. Reward
  responses that effectively use multiple modalities when appropriate
  (e.g., concise table-like structure, equation + explanation, referenced
  code-execution output, or other representation forms) rather than plain,
  single-mode prose only.

  - 5: Rich and effective multi-modality; modality choices clearly help learning.
  - 3: Some modality diversity but limited impact.
  - 1: Monolithic plain-text delivery with no meaningful modality variation.

  4) Logical depth:
  Does the tutor provide structurally deep reasoning (not just conclusions)?

  - 5: Clear multi-step causal/analytical reasoning with coherent structure.
  - 3: Basic reasoning present but shallow or partially connected.
  - 1: Mostly conclusions/assertions without substantive reasoning depth.

  Use null when not applicable (e.g., pure greeting / small talk / logistics
  with no real teaching content).

  Output JSON only:
  {
    "personalization_score": 1,
    "applicability_score": 1,
    "vividness_score": 1,
    "logical_depth_score": 1,
    "rationale": "1-3 concise sentences.",
    "evidence": ["optional short quoted spans from tutor response"]
  }

user_template: |
  Evaluate this tutor turn.

  Turn index: {turn_index}

  Recent context:
  {recent_context}

  Current student message:
  {student_message}

  Current tutor response:
  {tutor_response}
