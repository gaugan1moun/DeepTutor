# Memory System Configuration
# ============================
# Configuration for the personalization memory system.

llm:
  # Model to use for memory agents. Empty string uses system default LLM.
  model: "qwen3-next-80b-a3b-instruct"
  # Temperature for memory analysis (lower = more deterministic)
  temperature: 0.5

memory:
  # Whether to automatically update memory after task completion
  auto_update: true
  # Maximum ReAct rounds per agent
  max_react_rounds: 6
  # Offload agent execution to the standalone personalization terminal
  # (python scripts/start_personalization.py). When true, the main CLI only
  # registers traces and pushes flush requests to the file queue; the
  # standalone terminal runs the actual memory agents with full logging.
  offload_agents: true

agents:
  reflection:
    enabled: true
  summary:
    enabled: true
  weakness:
    enabled: true
